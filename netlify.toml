[build]
  base = "web"
  command = "npm run build"
  publish = "out"

# Next.js hashed chunks never change -- cache them aggressively
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Image and font assets -- long cache, browser can revalidate after a week
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

# SVG logo and other root-level static files
[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Docs static assets (CSS, JS, fonts) -- stable across deploys
[[headers]]
  for = "/docs/_static/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"
